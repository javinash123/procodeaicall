<VirtualHost *:80>
    ServerName nijvox.com
    ServerAlias www.nijvox.com
    Redirect permanent / https://nijvox.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName nijvox.com
    ServerAlias www.nijvox.com

    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/nijvox.com/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/nijvox.com/privkey.pem

    # Required Apache modules:
    # mod_proxy, mod_proxy_http, mod_proxy_wstunnel, mod_rewrite, mod_headers, mod_ssl

    ProxyPreserveHost On
    ProxyRequests Off

    # WebSocket proxy for /stream and /exotel-stream
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) "ws://127.0.0.1:5000/$1" [P,L]

    # HTTP proxy for everything else
    ProxyPass        / http://127.0.0.1:5000/
    ProxyPassReverse / http://127.0.0.1:5000/

    # Security headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    ErrorLog  /var/log/httpd/nijvox-error.log
    CustomLog /var/log/httpd/nijvox-access.log combined
</VirtualHost>
